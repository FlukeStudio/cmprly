backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "compare"
    label: "X vs Y Comparisons"
    folder: "src/content/compare"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "date", widget: "date" }
      - { label: "Last Verified", name: "lastVerified", widget: "date" }
      - { label: "Author", name: "author", widget: "string", default: "Cmprly Editorial" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "best"
    label: "Best-Of Guides"
    folder: "src/content/best"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "date", widget: "date" }
      - { label: "Last Verified", name: "lastVerified", widget: "date" }
      - { label: "Author", name: "author", widget: "string", default: "Cmprly Editorial" }
      - { label: "Body", name: "body", widget: "markdown" }

site_url: https://cmprly.com
display_url: https://cmprly.com
logo_url: https://cmprly.com/favicon.svg
